<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Roving Tabindex</title>
<link href="./index.css" rel="stylesheet">
</head>
<body>
<div class="stack">
  <p>direction: 'horizontal', typeahead: true, wrap: true</p>
  <div class="buttons -horizontal" id="horizontal-typeahead-wrap">
    <a href="#">Link</a>
    <button type="button">Apple</button>
    <button type="button">Avocado</button>
    <button type="button" disabled>Disabled</button>
    <button type="button">Banana</button>
    <a href="#">Link</a>
    <button type="button">Blueberry</button>
    <button type="button">Cherry</button>
  </div>
  <p><button class="cleanup-or-destroy" id="cleanup-1" type="button">Cleanup this roving</button></p>
</div>
<div class="spacer"></div>
<div class="stack">
  <p>direction: 'vertical', typeahead: true, wrap: true</p>
  <div class="buttons -vertical" id="vertical-typeahead-wrap">
    <a href="#">Link</a>
    <button type="button">Apple</button>
    <button type="button">Avocado</button>
    <button type="button" disabled>Disabled</button>
    <button type="button">Banana</button>
    <a href="#">Link</a>
    <button type="button">Blueberry</button>
    <button type="button">Cherry</button>
  </div>
  <p><button class="cleanup-or-destroy" id="cleanup-2" type="button">Cleanup this roving</button></p>
</div>
<div class="spacer"></div>
<div class="stack">
  <p>selector: 'button.pink', typeahead: true, wrap: true</p>
  <div class="buttons -horizontal" id="selector-typeahead-wrap">
    <a href="#">Link</a>
    <button class="pink" type="button">Apple</button>
    <button class="pink" type="button">Avocado</button>
    <button type="button" disabled>Disabled</button>
    <button type="button">Banana</button>
    <a href="#">Link</a>
    <button class="pink" type="button">Blueberry</button>
    <button type="button">Cherry</button>
  </div>
  <p><button class="cleanup-or-destroy" id="cleanup-3" type="button">Cleanup this roving</button></p>
</div>
<div class="spacer"></div>
<div class="stack">
  <p>No options</p>
  <div class="buttons -horizontal" id="no-options">
    <a href="#">Link</a>
    <button type="button">Apple</button>
    <button type="button">Avocado</button>
    <button type="button" disabled>Disabled</button>
    <button type="button">Banana</button>
    <a href="#">Link</a>
    <button type="button">Blueberry</button>
    <button type="button">Cherry</button>
  </div>
  <p><button class="cleanup-or-destroy" id="cleanup-4" type="button">Cleanup this roving</button></p>
</div>
<script type="module">
import { createRovingTabIndex } from 'https://esm.sh/@y14e/roving-tabindex';

const cleanupRoving1 = createRovingTabIndex(document.getElementById('horizontal-typeahead-wrap'), {
  direction: 'horizontal',
  typeahead: true,
  wrap: true,
});
const cleanupRoving2 = createRovingTabIndex(document.getElementById('vertical-typeahead-wrap'), {
  direction: 'vertical',
  typeahead: true,
  wrap: true,
});
const cleanupRoving3 = createRovingTabIndex(document.getElementById('selector-typeahead-wrap'), {
  selector: 'button.pink',
  typeahead: true,
  wrap: true,
});
const cleanupRoving4 = createRovingTabIndex(document.getElementById('no-options'));

document.getElementById('cleanup-1').addEventListener('click', (event) => {
  cleanupRoving1();
  const button = event.currentTarget;
  button.disabled = true;
  button.textContent = 'Cleaned up';
});

document.getElementById('cleanup-2').addEventListener('click', (event) => {
  cleanupRoving2();
  const button = event.currentTarget;
  button.disabled = true;
  button.textContent = 'Cleaned up';
});

document.getElementById('cleanup-3').addEventListener('click', (event) => {
  cleanupRoving3();
  const button = event.currentTarget;
  button.disabled = true;
  button.textContent = 'Cleaned up';
});

document.getElementById('cleanup-4').addEventListener('click', (event) => {
  cleanupRoving4();
  const button = event.currentTarget;
  button.disabled = true;
  button.textContent = 'Cleaned up';
});
</script>
</body>
</html>
