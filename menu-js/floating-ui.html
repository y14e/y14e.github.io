<a id="anchor"></a>
<script type="module">
import { flip, offset, shift } from 'https://cdn.jsdelivr.net/npm/@floating-ui/dom@1.7.0/+esm';
import { Menu } from './menu-floating-ui.js';
document.querySelectorAll('[data-menu]').forEach(element => {
  const myMenu = new Menu(element, {
    floatingUi: {
      middleware: [
        flip({
          padding: 8,
        }),
        offset(8),
        shift(),
      ],
    },
    submenuFloatingUi: {
      middleware: [
        flip({
          padding: -8,
        }),
        offset({
          crossAxis: -8,
          mainAxis: -8,
        }),
        shift(),
      ],
    },
  });
  element.querySelectorAll('[role="menuitem"]:not([aria-haspopup])').forEach(item => {
    item.addEventListener('click', () => {
      console.log(item.textContent);
      myMenu.close();
    });
  });
  element.querySelectorAll('[role="menuitemcheckbox"]').forEach(item => {
    item.addEventListener('click', () => {
      console.log([...item.closest('[role="group"]').querySelectorAll('[role="menuitemcheckbox"]')].filter(item => item.getAttribute('aria-checked') === 'true').map(item => item.textContent));
    });
  });
  element.querySelectorAll('[role="menuitemradio"]').forEach(item => {
    item.addEventListener('click', () => {
      console.log([...item.closest('[role="group"]').querySelectorAll('[role="menuitemradio"]')].filter(item => item.getAttribute('aria-checked') === 'true').map(item => item.textContent));
    });
  });
  window.addEventListener('blur', () => {
    myMenu.close();
  });
});
</script>
