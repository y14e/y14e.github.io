<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>menu.js</title>
<link rel="stylesheet" href="./index.css">
</head>
<body>
<div data-menu>
  <button data-menu-trigger>Button</button>
  <ul role="menu">
    <li role="menuitem">Lorem</li>
    <li role="menuitem">Ipsum</li>
    <li role="menuitem">Dolor</li>
    <li role="menuitem" aria-disabled="true">Disabled</li>
    <li role="menuitem">Sit</li>
    <li role="menuitem">Amet</li>
    <li role="menuitem">Consectetur</li>
    <li role="menuitem">Adipiscing</li>
    <li role="menuitem">Elit</li>
  </ul>
</div>
<div data-menu>
  <button data-menu-trigger>Button</button>
  <ul role="menu">
    <li role="none"><a role="menuitem" href="#anchor">Lorem</a></li>
    <li role="none"><a role="menuitem" href="#anchor">Ipsum</a></li>
    <li role="none"><a role="menuitem" href="#anchor">Dolor</a></li>
    <li role="none"><a role="menuitem" href="#anchor" aria-disabled="true">Disabled</a></li>
    <li role="none"><a role="menuitem" href="#anchor">Sit</a></li>
    <li role="none"><a role="menuitem" href="#anchor">Amet</a></li>
    <li role="none"><a role="menuitem" href="#anchor">Consectetur</a></li>
    <li role="none"><a role="menuitem" href="#anchor">Adipiscing</a></li>
    <li role="none"><a role="menuitem" href="#anchor">Elit</a></li>
  </ul>
</div>
<div id="anchor"></div>
<script type="module">
import Menu from './menu.js';
document.querySelectorAll('[data-menu]').forEach(element => {
  const myMenu = new Menu(element);
  element.querySelectorAll('[role="menuitem"]').forEach(item => item.addEventListener('click', () => {
    console.log(item.textContent);
    myMenu.close();
  }));
});
</script>
</body>
</html>
