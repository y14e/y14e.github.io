<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>menu-button.js</title>
<link rel="stylesheet" href="./index.css">
</head>
<body>
<div data-menu-button>
  <button data-menu-button-trigger>Button</button>
  <ul role="menu">
    <li role="menuitem">Lorem</li>
    <li role="menuitem">Ipsum</li>
    <li role="menuitem">Dolor</li>
    <li role="menuitem" aria-disabled="true">Disabled</li>
    <li role="menuitem">Sit</li>
    <li role="menuitem">Amet</li>
    <li role="menuitem">Consectetur</li>
    <li role="menuitem">Adipiscing</li>
    <li role="menuitem">Elit</li>
  </ul>
</div><!--
--><div data-menu-button>
  <button data-menu-button-trigger>Button</button>
  <ul role="menu">
    <li role="presentation"><a role="menuitem" href="#target">Lorem</a></li>
    <li role="presentation"><a role="menuitem" href="#target">Ipsum</a></li>
    <li role="presentation"><a role="menuitem" href="#target">Dolor</a></li>
    <li role="presentation"><a role="menuitem" href="#target" aria-disabled="true">Disabled</a></li>
    <li role="presentation"><a role="menuitem" href="#target">Sit</a></li>
    <li role="presentation"><a role="menuitem" href="#target">Amet</a></li>
    <li role="presentation"><a role="menuitem" href="#target">Consectetur</a></li>
    <li role="presentation"><a role="menuitem" href="#target">Adipiscing</a></li>
    <li role="presentation"><a role="menuitem" href="#target">Elit</a></li>
  </ul>
</div>
<div id="target"></div>
<script type="module">
import MenuButton from './menu-button.js';
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('[data-menu-button]').forEach(a => {
    const myMenuButton = new MenuButton(a);
    a.querySelectorAll('[role="menuitem"]').forEach(b => b.addEventListener('click', () => myMenuButton.close()));
  });
});
</script>
</body>
</html>
